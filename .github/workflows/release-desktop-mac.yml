name: Release Desktop (macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Build workspace (tier0 → cli)
        run: |
          pnpm run build:tier0
          pnpm run build:tier1
          pnpm run build:tier2
          pnpm run build:tier3
          pnpm --filter=@antseed/cli run build

      - name: Write API key
        run: |
          mkdir -p ~/.config/antseed
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > ~/.config/antseed/AuthKey_6JDM29LC2C.p8

      - name: Create .env for desktop
        run: |
          echo "APPLE_API_KEY=$HOME/.config/antseed/AuthKey_6JDM29LC2C.p8" > apps/desktop/.env
          echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}" >> apps/desktop/.env
          echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> apps/desktop/.env
          echo "GH_TOKEN=${{ github.token }}" >> apps/desktop/.env

      - name: Build, sign, notarize & publish
        working-directory: apps/desktop
        run: pnpm run release:mac
