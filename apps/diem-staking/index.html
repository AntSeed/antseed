<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />

    <!-- Primary tab identity -->
    <title>DIEM Staking — earn USDC yield on AntSeed</title>
    <meta
      name="description"
      content="Stake your DIEM into the AntSeed pool on Base. Earn real USDC yield from AI inference demand, plus $ANTS token rewards. Fully on-chain, zero pool fees."
    />
    <meta name="theme-color" content="#1FD87A" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://diem-staking.antseed.com/" />

    <!-- Favicon + iOS homescreen. SVG is the primary; modern browsers honour it.
         No raster fallback shipped — that's a future improvement (see README). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="apple-mobile-web-app-title" content="DIEM Staking" />
    <meta name="application-name" content="DIEM Staking" />

    <!-- Open Graph — mirrors the pattern in apps/website/docusaurus.config.ts
         so link unfurls across the three AntSeed apps feel like one brand.
         og:image points at the parent site until a dedicated DIEM staking
         image is produced (see README). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AntSeed" />
    <meta property="og:url" content="https://diem-staking.antseed.com/" />
    <meta property="og:title" content="DIEM Staking — earn USDC yield on AntSeed" />
    <meta
      property="og:description"
      content="Stake your DIEM. Earn real USDC yield from AI inference demand on the AntSeed network. Plus $ANTS token rewards, claimable on-chain."
    />
    <meta property="og:image" content="https://antseed.com/og-image.jpg" />
    <meta property="og:image:alt" content="AntSeed — the open market for AI inference" />

    <!-- Twitter cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DIEM Staking — earn USDC yield on AntSeed" />
    <meta
      name="twitter:description"
      content="Stake your DIEM. Earn real USDC yield from AI inference demand on the AntSeed network. Plus $ANTS token rewards, claimable on-chain."
    />
    <meta name="twitter:image" content="https://antseed.com/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
