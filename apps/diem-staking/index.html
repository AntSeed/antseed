<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Mirrors apps/website/docusaurus.config.ts so the subdomain feels like
         the same brand. Only DIEM-focused fields differ: <title>, description,
         og:title, og:description, twitter:title, twitter:description, and the
         canonical URL. Everything else — keywords, og:type, images, favicon,
         fonts — is identical to antseed.com. -->

    <title>DIEM Staking — earn USDC yield on AntSeed</title>
    <meta
      name="description"
      content="Stake your DIEM into the AntSeed pool on Base. Earn real USDC yield from AI inference demand, plus $ANTS token rewards. Fully on-chain, zero pool fees."
    />
    <link rel="canonical" href="https://diem.antseed.com/" />

    <!-- Same favicon as antseed.com (the AntSeed ant) so users see one brand. -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- Fonts — identical to the website stylesheet block. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap"
    />

    <!-- Keywords + social — identical to the website's metadata array. -->
    <meta
      name="keywords"
      content="AI marketplace, OpenRouter alternative, serving AI inference, consuming AI inference, peer-to-peer AI, decentralized AI inference, anonymous AI, private AI, P2P AI, AI economy"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://antseed.com/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://antseed.com/og-image.jpg" />

    <!-- DIEM-focused title/description pair for og + twitter. -->
    <meta property="og:title" content="DIEM Staking — earn USDC yield on AntSeed" />
    <meta
      property="og:description"
      content="Stake your DIEM. Earn real USDC yield from AI inference demand on the AntSeed network. Plus $ANTS token rewards, claimable on-chain."
    />
    <meta name="twitter:title" content="DIEM Staking — earn USDC yield on AntSeed" />
    <meta
      name="twitter:description"
      content="Stake your DIEM. Earn real USDC yield from AI inference demand on the AntSeed network. Plus $ANTS token rewards, claimable on-chain."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
