<section id="view-sessions" class="view" role="tabpanel">
  <div class="page-header">
    <h2>Sessions</h2>
    <div id="sessionsMeta" class="connection-badge badge-idle">0 sessions</div>
  </div>
  <p id="sessionsMessage" class="message">Loading session metrics...</p>
  <div class="panel">
    <div class="table-wrap">
      <table class="table">
        <thead id="sessionsHead">
          <tr>
            <th class="sortable" data-sort="sessionId">Session</th>
            <th class="sortable" data-sort="provider">Provider</th>
            <th class="sortable" data-sort="startedAt">Started</th>
            <th class="sortable" data-sort="totalTokens">Tokens</th>
            <th class="sortable" data-sort="totalRequests">Requests</th>
            <th class="sortable" data-sort="durationMs">Duration</th>
            <th class="sortable" data-sort="avgLatencyMs">Latency</th>
            <th class="sortable" data-sort="peerSwitches">Switches</th>
          </tr>
        </thead>
        <tbody id="sessionsBody">
          <tr><td colspan="8" class="empty">No sessions yet.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
