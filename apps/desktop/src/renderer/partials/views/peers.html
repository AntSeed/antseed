<section id="view-peers" class="view" role="tabpanel">
  <div class="page-header">
    <h2>Peers</h2>
    <div class="page-header-right">
      <input id="peerFilter" type="text" class="filter-input" placeholder="Filter peers..." />
      <button id="scanNetworkBtnPeers" class="secondary">Scan DHT</button>
      <div id="peersMeta" class="connection-badge badge-idle">0 peers</div>
    </div>
  </div>
  <p id="peersMessage" class="message">Loading peer visibility...</p>
  <div class="panel">
    <div class="table-wrap">
      <table class="table">
        <thead id="peersHead">
          <tr>
            <th class="sortable" data-sort="peerId">Peer</th>
            <th class="sortable" data-sort="source">Source</th>
            <th class="sortable" data-sort="providers">Providers</th>
            <th class="sortable" data-sort="inputUsdPerMillion">Input $/1M</th>
            <th class="sortable" data-sort="outputUsdPerMillion">Output $/1M</th>
            <th class="sortable" data-sort="capacityMsgPerHour">Capacity</th>
            <th class="sortable" data-sort="reputation">Rep</th>
            <th class="sortable" data-sort="location">Location</th>
            <th>Endpoint</th>
          </tr>
        </thead>
        <tbody id="peersBody">
          <tr><td colspan="9" class="empty">No peers yet.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
