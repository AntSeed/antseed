<section id="view-overview" class="view" role="tabpanel">
  <div class="page-header">
    <h2>Overview</h2>
    <div id="overviewBadge" class="connection-badge badge-idle">Idle</div>
  </div>

  <div class="stat-grid">
    <div class="stat-card">
      <p class="stat-label">Buyer Runtime</p>
      <p id="ovNodeState" class="stat-value">idle</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Active Peers</p>
      <p id="ovPeers" class="stat-value">0</p>
    </div>
    <div id="ovSessionsCard" class="stat-card" data-mode="seeder">
      <p class="stat-label">Active Sessions</p>
      <p id="ovSessions" class="stat-value">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">DHT Health</p>
      <p id="ovDhtHealth" class="stat-value">Down</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Proxy Port</p>
      <p id="ovUptime" class="stat-value">-</p>
    </div>
  </div>

  <div class="panel-grid two-col">
    <article class="panel panel-span-full" data-mode="connect">
      <div class="panel-head">
        <h3>Top Peers</h3>
        <span id="ovPeersCount" class="panel-count">0</span>
      </div>
      <div class="table-wrap compact">
        <table class="table">
          <thead>
            <tr>
              <th>Peer</th>
              <th>Providers</th>
              <th>Rep</th>
            </tr>
          </thead>
          <tbody id="overviewPeersBody">
            <tr><td colspan="3" class="empty">No peers yet.</td></tr>
          </tbody>
        </table>
      </div>
    </article>

    <article class="panel" data-mode="seeder">
      <div class="panel-head">
        <h3>Capacity & Earnings</h3>
      </div>
      <div class="capacity-section">
        <div id="capacityRing" class="capacity-ring">
          <svg width="100" height="100" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" fill="none" stroke="var(--border)" stroke-width="8" />
            <circle id="capacityArc" cx="50" cy="50" r="40" fill="none"
              stroke="var(--accent-green)" stroke-width="8"
              stroke-linecap="round"
              stroke-dasharray="251.33" stroke-dashoffset="251.33"
              transform="rotate(-90 50 50)"
              style="transition: stroke-dashoffset 0.6s ease, stroke 0.3s ease" />
          </svg>
          <div class="capacity-ring-label">
            <div id="capacityPercent" class="capacity-ring-value">0%</div>
            <div class="capacity-ring-text">capacity</div>
          </div>
        </div>
        <div class="capacity-meta">
          <div class="capacity-row"><span class="capacity-label">Proxy Port</span><span id="ovProxyPort" class="capacity-val mono">-</span></div>
          <div class="capacity-row"><span class="capacity-label">Sessions</span><span id="ovCapSessions" class="capacity-val">0</span></div>
          <div class="capacity-row"><span class="capacity-label">Peers</span><span id="ovCapPeers" class="capacity-val">0</span></div>
          <div class="capacity-row"><span class="capacity-label">DHT Nodes</span><span id="ovCapDht" class="capacity-val">0</span></div>
        </div>
      </div>
      <div class="panel-divider"></div>
      <div class="panel-head"><h3>Recent Earnings</h3></div>
      <div id="miniChartContainer" class="mini-chart">
        <div class="mini-chart-empty">No earnings data yet</div>
      </div>
    </article>
  </div>
</section>
