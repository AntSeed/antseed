[profile.default]
src = "contracts"
test = "contracts/test"
out = "contracts/out"
cache_path = "contracts/cache_forge"
libs = ["node_modules", "lib", "../../node_modules"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
